<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200" preserveAspectRatio="xMidYMid meet">
  <!-- Transparent background so SVG blends with button -->

  <!-- Group of 10 nested ovals. Translucent gray strokes to match UI style. 
       Ovals are non-touching, spaced wider at the top and compressed toward the bottom.
       Rotated -35 degrees to point toward top-center. Center of rotation = 100,100. -->
  <g transform="translate(6 6) rotate(-35 100 100)" stroke="rgba(255,255,255,0.60)" stroke-width="3" fill="none" stroke-linecap="round">
    <!-- Slight southeast translation and increased downward bunching toward the narrow end -->
    <ellipse cx="104" cy="92" rx="46" ry="74" />
    <ellipse cx="105" cy="96" rx="40" ry="68" />
    <ellipse cx="106" cy="100" rx="36" ry="62" />
    <ellipse cx="107" cy="104" rx="32" ry="56" />
    <ellipse cx="108" cy="108" rx="28" ry="50" />
    <ellipse cx="109" cy="112" rx="24" ry="44" />
    <ellipse cx="110" cy="116" rx="20" ry="38" />
    <ellipse cx="111" cy="120" rx="16" ry="32" />
    <ellipse cx="112" cy="124" rx="12" ry="26" />
    <ellipse cx="113" cy="128" rx="8" ry="20" />
  </g>

</svg>
