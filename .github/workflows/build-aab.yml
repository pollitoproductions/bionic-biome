name: Build AAB

on:
  workflow_dispatch: {}
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      GRADLE_OPTS: -Dorg.gradle.jvmargs='-Xmx1536m'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK (platform 35)
        uses: r0adkll/setup-android@v2
        with:
          api-level: 35
          build-tools: '35.0.0'
          cmake: false

      - name: Download Gradle 8.1.1
        run: |
          curl -fsSL https://services.gradle.org/distributions/gradle-8.1.1-bin.zip -o /tmp/gradle-8.1.1-bin.zip
          unzip -q /tmp/gradle-8.1.1-bin.zip -d $HOME/gradle
          echo "$HOME/gradle/gradle-8.1.1/bin" >> $GITHUB_PATH

      - name: Build AAB
        working-directory: android
        run: |
          echo "sdk.dir=$RUNNER_WORKSPACE/android/android-sdk" > local.properties
          $HOME/gradle/gradle-8.1.1/bin/gradle :app:bundleRelease --no-daemon --stacktrace

      - name: Upload AAB artifact
        uses: actions/upload-artifact@v4
        with:
          name: bionic-biome-aab
          path: android/app/build/outputs/bundle/release/*.aab
